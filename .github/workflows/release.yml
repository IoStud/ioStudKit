name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Swift 6.1
        uses: fwal/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Build package for distribution
        run: swift build --configuration release

      - name: Package release binaries
        run: |
          mkdir build-artifacts
          cp -r .build/release/* build-artifacts/
          cd build-artifacts
          zip -r ../ioStudKit-binaries.zip .

      - name: Build XCFramework from SwiftPM
        run: |
          mkdir -p build/xcframework
          SWIFT_MODULE=IoStudKit
          
          xcodebuild -create-xcframework \
            -library .build/release/lib$SWIFT_MODULE.a \
            -headers Sources/$SWIFT_MODULE \
            -output build/xcframework/$SWIFT_MODULE.xcframework

          cd build/xcframework
          zip -r ../../ioStudKit-xcframework.zip *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ioStudKit-binaries.zip
            ioStudKit-xcframework.zip
